<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="description" content="Diagnostic RNZ — Koman ou lé vréman zordi ?"/>
<title>RNZ — Diagnostic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #120e08;
    --bg-card:   #1a1510;
    --bg-hover:  #211a12;
    --border:    #2e2720;
    --border-hi: #433b31;
    --text:      #F5F0E8;
    --text-2:    #D4CCBE;
    --text-3:    #9A9288;
    --text-4:    #5C554D;
    --text-5:    #352E28;
    --gold:      #C9A96E;
    --gold-dim:  #8A7250;
    --gold-glow: rgba(201,169,110,.14);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans:  'DM Sans', system-ui, sans-serif;
    --ease:  cubic-bezier(.22,.68,0,1.15);
    --radius: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    font-size: 16px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    background-image: radial-gradient(ellipse 140% 50% at 50% 0%, #201810 0%, transparent 65%);
  }

  @keyframes rnzUp   { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin    { to { transform:rotate(360deg); } }
  @keyframes phIn  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes phOut { from { opacity:1; transform:translateY(0) scale(1); } to { opacity:0; transform:translateY(-10px) scale(.99); } }

  /* ── PAGE ── */
  .page {
    min-height: 100dvh;
    max-width: 560px;
    margin: 0 auto;
    padding: 64px 28px max(100px, env(safe-area-inset-bottom, 0px) + 72px);
    display: flex;
    flex-direction: column;
  }

  /* ── LOGO ── */
  .logo {
    font-family: var(--serif); font-size: 11px; font-weight: 400;
    letter-spacing: .58em; color: var(--gold-dim);
    text-transform: uppercase; margin-bottom: 64px; user-select: none;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--text-4);
    margin-bottom: 22px;
  }

  /* ── GOLD LINE ── */
  .gold-line {
    width: 32px; height: 1px;
    background: var(--gold-dim); opacity: .4;
    flex-shrink: 0;
  }

  /* ══ ACCUEIL ══ */
  .accueil-titre {
    font-family: var(--serif); font-size: clamp(36px, 10vw, 54px);
    font-weight: 300; line-height: 1.08; letter-spacing: .02em;
    color: var(--text); margin-bottom: 56px;
  }

  .accueil-corps {
    display: flex; flex-direction: column; gap: 28px;
    font-size: 16px; line-height: 1.95;
    color: var(--text-2); margin-bottom: 56px;
  }

  .accueil-citation {
    font-family: var(--serif); font-style: italic;
    font-size: 22px; color: var(--gold); padding: 8px 0; line-height: 1.55;
  }

  .accueil-note { color: var(--text-3); font-size: 15px; line-height: 1.85; }

  .accueil-credits {
    text-align: center; font-size: 13px; color: var(--text-3);
    margin-top: 24px; letter-spacing: .02em; line-height: 1.7;
  }

  /* ── Pourquoi ── */
  .pourquoi-section {
    display: flex; flex-direction: column;
    align-items: flex-start; gap: 24px;
    margin-bottom: 56px;
  }

  .pourquoi-texte {
    font-family: var(--serif); font-style: italic;
    font-size: 18px; color: var(--text-2);
    line-height: 1.88; padding: 0 4px;
  }

  /* ── Ce diagnostic lé pa ── */
  .pasunsection { margin-bottom: 56px; }

  .pasun-list {
    display: flex; flex-direction: column; gap: 0;
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }

  .pasun-item {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 18px 22px; background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    font-size: 15px; color: var(--text-2); line-height: 1.65;
  }

  .pasun-item:last-child { border-bottom: none; }

  .pasun-last { color: var(--text); background: var(--bg-hover); }

  .pasun-check {
    font-size: 13px; color: var(--gold-dim);
    flex-shrink: 0; margin-top: 3px; font-family: var(--sans);
  }

  /* ── Trust grid ── */
  .trust-section { margin-bottom: 56px; }

  .trust-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }

  .trust-cell {
    background: var(--bg-card); display: flex; flex-direction: column;
    align-items: center; text-align: center; gap: 8px; padding: 26px 16px;
  }

  .trust-num {
    font-family: var(--serif); font-size: 22px; font-weight: 300;
    color: var(--gold); line-height: 1;
  }

  .trust-lbl { font-size: 12px; color: var(--text-3); line-height: 1.5; }

  /* ── PDFs row ── */
  .pdfs-section { margin-bottom: 56px; }

  .pdfs-row {
    display: flex; gap: 16px; margin-bottom: 16px;
    overflow-x: auto; padding-bottom: 4px;
  }

  .pdf-preview-card {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    flex-shrink: 0;
  }

  .pdf-preview-titre {
    font-family: var(--serif); font-style: italic;
    font-size: 13px; color: var(--text-3);
    text-align: center; max-width: 130px; line-height: 1.4;
  }

  .pdfs-note { font-size: 12px; color: var(--text-4); text-align: center; line-height: 1.7; }

  /* ── Témoignages ── */
  .temoignages-section { margin-bottom: 56px; }

  .temoignages-list {
    display: flex; flex-direction: column; gap: 1px;
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }

  .temoignage-item {
    background: var(--bg-card); padding: 24px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }

  .temoignage-item:last-child { border-bottom: none; }

  .temoignage-texte {
    font-family: var(--serif); font-style: italic;
    font-size: 16px; color: var(--text-2); line-height: 1.78;
  }

  .temoignage-lieu { font-size: 12px; color: var(--text-4); letter-spacing: .06em; }

  /* ── Manifeste ── */
  .manifeste {
    display: flex; flex-direction: column; align-items: center;
    gap: 24px; margin-bottom: 48px; padding: 0 12px;
  }

  .manifeste-line { width: 32px; height: 1px; background: var(--gold-dim); opacity: .45; }

  .manifeste-texte {
    font-family: var(--serif); font-style: italic;
    font-size: 19px; color: var(--text-2);
    text-align: center; line-height: 1.85;
  }

  /* ── FAQ ── */
  .faq-section { margin-top: 60px; }

  .faq-item {
    border-bottom: 1px solid var(--border);
    padding: 20px 0; cursor: pointer;
  }
  .faq-item:first-of-type { border-top: 1px solid var(--border); }

  .faq-q {
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
    font-size: 15px; color: var(--text-2); font-weight: 400; line-height: 1.6;
    user-select: none;
  }

  .faq-chevron { font-size: 20px; color: var(--gold-dim); flex-shrink: 0; line-height: 1; font-weight: 200; }
  .faq-a { font-size: 15px; color: var(--text-3); line-height: 1.85; margin-top: 14px; padding-right: 24px; }

  /* ══ BOUTONS ══ */
  .btn-main {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    width: 100%;
    background: linear-gradient(135deg, #D4B47A 0%, #B08A50 100%);
    color: #0A0908; border: none; padding: 22px 36px;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    letter-spacing: .22em; text-transform: uppercase;
    cursor: pointer; border-radius: var(--radius);
    transition: opacity .3s, transform .15s, box-shadow .3s;
    box-shadow: 0 6px 36px rgba(201,169,110,.25), 0 1px 0 rgba(255,255,255,.06) inset;
    min-height: 60px;
  }

  .btn-main--cta { margin-top: 0; }
  .btn-main:hover   { opacity:.88; box-shadow:0 10px 44px rgba(201,169,110,.35); }
  .btn-main:active  { transform:scale(.988); }
  .btn-main:disabled { background:var(--border-hi); color:var(--text-4); cursor:not-allowed; box-shadow:none; }

  .btn-arrow { font-size:15px; opacity:.75; transition:transform .25s; }
  .btn-main:hover .btn-arrow { transform:translateX(4px); }

  .btn-ghost {
    display:block; width:100%; background:transparent; color:var(--text-3);
    border:1px solid var(--border); padding:18px 32px;
    font-family:var(--sans); font-size:12px; font-weight:400;
    letter-spacing:.16em; text-transform:uppercase;
    cursor:pointer; margin-top:14px; border-radius:var(--radius);
    transition:border-color .25s,color .25s;
    min-height: 56px;
  }
  .btn-ghost:hover { border-color:var(--border-hi); color:var(--text-2); }

  /* ══ QUESTION ══ */
  .page-question { padding-top: 40px; transition:opacity .6s var(--ease),transform .6s var(--ease); }
  .ps-enter { opacity:0; transform:translateY(20px); }
  .ps-show  { opacity:1; transform:translateY(0); }
  .ps-leave { opacity:0; transform:translateY(-20px); }

  .q-progress-wrap { display:flex; align-items:center; gap:14px; margin-bottom:48px; }
  .q-progress { flex:1; height:1.5px; background:var(--border); overflow:hidden; border-radius:2px; }
  .q-progress-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); transition:width .8s var(--ease); }
  .q-count-inline { font-size:11px; letter-spacing:.14em; color:var(--text-4); text-transform:uppercase; white-space:nowrap; flex-shrink:0; }

  .q-meta { display:flex; flex-direction:column; gap:8px; margin-bottom:48px; }
  .q-breathe { font-family:var(--serif); font-style:italic; font-size:16px; color:var(--gold); letter-spacing:.02em; line-height:1.6; }
  .q-hint { font-size:13px; color:var(--text-3); line-height:1.65; }

  .q-body { margin-bottom:44px; }
  .q-text {
    font-family: var(--serif);
    font-size: clamp(24px, 6.5vw, 34px);
    font-weight: 300; line-height: 1.5;
    color: var(--text); letter-spacing: .01em;
  }

  .q-answers { display:flex; flex-direction:column; gap:14px; }
  .btn-answer {
    position: relative; background: var(--bg-card); border: 1px solid var(--border);
    padding: 20px 22px 20px 24px; text-align: left;
    font-family: var(--sans); font-size: 15px; font-weight: 300; line-height: 1.7;
    color: var(--text-2); cursor: pointer; border-radius: var(--radius);
    transition: border-color .2s, background .2s, color .2s, transform .15s;
    overflow: hidden; min-height: 64px;
  }
  .btn-answer::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--gold); border-radius:var(--radius) 0 0 var(--radius); opacity:0; transition:opacity .2s; }
  .btn-answer:hover { border-color:var(--border-hi); background:var(--bg-hover); color:var(--text); transform:translateX(3px); }
  .btn-answer:hover::before { opacity:1; }
  .btn-answer:active { transform:translateX(1px); }
  .btn-answer.locked { pointer-events:none; opacity:.18; }

  /* Selected answer highlight */
  .btn-answer.selected {
    border-color: var(--gold-dim);
    background: rgba(201,169,110,.07);
    color: var(--gold);
  }
  .btn-answer.selected::before { opacity: 1; }

  /* ── Phrase ── */
  .phrase-wrap {
    position:fixed; bottom:0; left:0; right:0;
    background:linear-gradient(to bottom,transparent 0%,rgba(18,14,8,.97) 22%,rgba(18,14,8,1) 100%);
    padding:56px 32px 60px; text-align:center; z-index:200;
  }
  .ph-in   { animation:phIn  900ms var(--ease) both; }
  .ph-hold { opacity:1; }
  .ph-out  { animation:phOut 1400ms ease both; }
  .phrase-ornament { width:32px; height:1px; background:var(--gold-dim); margin:0 auto 22px; opacity:.45; }
  .phrase-text { font-family:var(--serif); font-style:italic; font-weight:300; font-size:clamp(19px,5.5vw,25px); color:var(--gold); line-height:1.78; max-width:460px; margin:0 auto 18px; letter-spacing:.01em; }
  .phrase-sub { font-size:11px; color:var(--text-5); letter-spacing:.14em; text-transform:uppercase; }

  /* ══ ANALYSE ══ */
  .page-analyse { justify-content:center; align-items:center; text-align:center; }
  .analyse-box  { display:flex; flex-direction:column; align-items:center; gap:32px; }
  .analyse-ring { width:36px; height:36px; border:1.5px solid var(--border-hi); border-top-color:var(--gold); border-radius:50%; animation:spin 1.8s linear infinite; }
  .analyse-titre { font-family:var(--serif); font-size:27px; font-weight:300; color:var(--text); }
  .analyse-sub   { font-size:15px; color:var(--text-3); line-height:1.9; }
  .analyse-steps { display:flex; flex-direction:column; gap:14px; margin-top:10px; }
  .analyse-step  { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-5); transition:color .6s ease; }
  .analyse-step.on { color:var(--gold); }

  /* ══ RÉSULTAT ══ */
  .page-resultat { padding-top:64px; }

  .res-logo { font-family:var(--serif); font-size:11px; font-weight:400; letter-spacing:.52em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:64px; opacity:0; transition:opacity 1s ease; }
  .res-logo.on { opacity:1; }

  .res-intro-1 { font-family:var(--serif); font-style:italic; font-size:16px; color:var(--text-4); letter-spacing:.04em; margin-bottom:12px; opacity:0; transform:translateY(8px); transition:opacity .9s ease,transform .9s ease; }
  .res-intro-1.on { opacity:1; transform:translateY(0); }

  .res-intro-2 { font-family:var(--serif); font-style:italic; font-size:15px; color:var(--text-3); letter-spacing:.03em; margin-bottom:28px; opacity:0; transform:translateY(8px); transition:opacity .9s ease .2s,transform .9s ease .2s; }
  .res-intro-2.on { opacity:1; transform:translateY(0); }

  .res-nom { margin-bottom:56px; opacity:0; transform:translateY(14px); transition:opacity 1.1s ease,transform 1.1s ease; }
  .res-nom.on { opacity:1; transform:translateY(0); }

  .res-prenom { display:block; font-family:var(--serif); font-style:italic; font-size:21px; font-weight:300; color:var(--text-3); margin-bottom:10px; }
  .res-profil { font-family:var(--serif); font-size:clamp(30px,8.5vw,44px); font-weight:300; letter-spacing:.025em; color:var(--text); line-height:1.1; }
  .res-divider { width:40px; height:1px; background:var(--gold-dim); margin:24px 0 0; opacity:.55; }

  .res-body { opacity:0; transform:translateY(10px); transition:opacity 1s ease,transform 1s ease; }
  .res-body.on { opacity:1; transform:translateY(0); }

  .res-texte { display:flex; flex-direction:column; gap:24px; font-size:16px; line-height:1.95; color:var(--text-2); margin-bottom:44px; }

  .res-avant-pdf { border-left:2px solid var(--gold-dim); padding:6px 0 6px 22px; margin-bottom:44px; display:flex; flex-direction:column; gap:10px; }
  .res-avant-pdf p { font-family:var(--serif); font-style:italic; font-size:17px; color:var(--text-3); line-height:1.78; }

  .res-extras { display:flex; flex-direction:column; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:44px; background:var(--bg-card); }
  .res-extra-row { display:flex; align-items:center; gap:18px; padding:20px 24px; border-bottom:1px solid var(--border); }
  .res-extra-row:last-child { border-bottom:none; }
  .res-extra-icon { font-size:18px; flex-shrink:0; }
  .res-extra-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-4); margin-bottom:4px; }
  .res-extra-val { font-family:var(--serif); font-style:italic; font-size:18px; color:var(--text-2); }

  .res-pdf-desc {
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    color: var(--text-3);
    line-height: 1.82;
    margin-bottom: 28px;
    padding: 0 6px;
  }

  .res-disclaimer { font-size:13px; color:var(--text-4); line-height:1.95; text-align:center; margin-bottom:48px; padding:0 12px; }

  /* ══ EMAIL ══ */
  .email-cover-hero {
    display: flex; flex-direction: column; align-items: center;
    gap: 24px; margin-bottom: 48px; position: relative;
  }

  .email-cover-glow {
    position: absolute; top: 20px;
    width: 220px; height: 220px;
    background: radial-gradient(ellipse, var(--gold-glow) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .email-cover-hero img {
    position: relative; z-index: 1;
    max-width: 210px; width: 60vw;
  }

  .email-cover-caption {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; text-align: center; position: relative; z-index: 1;
  }

  .email-cover-tag {
    font-size: 10px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--gold-dim);
  }

  .email-cover-titre {
    font-family: var(--serif); font-style: italic;
    font-size: 21px; color: var(--text); line-height: 1.35;
  }

  .email-cover-sous { font-size: 13px; color: var(--text-3); line-height: 1.55; }

  .email-titre { font-family:var(--serif); font-size:clamp(22px,6.5vw,32px); font-weight:300; letter-spacing:.02em; color:var(--text); margin-bottom:28px; }
  .email-sub   { font-size:16px; color:var(--text-2); line-height:1.95; margin-bottom:32px; }
  .email-liste { display:flex; flex-direction:column; gap:14px; font-size:14px; color:var(--text-3); margin-bottom:44px; line-height:1.7; }

  .form-stack { display:flex; flex-direction:column; gap:14px; margin-bottom:24px; }

  .field {
    width:100%; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px 20px; font-family:var(--sans); font-size:16px; font-weight:300;
    color:var(--text); outline:none; transition:border-color .25s,box-shadow .25s;
    min-height: 58px;
  }
  .field:focus { border-color:var(--gold-dim); box-shadow:0 0 0 4px var(--gold-glow); }
  .field::placeholder { color:var(--text-4); }

  .form-err    { font-size:13px; color:#C07055; margin-bottom:16px; line-height:1.6; }
  .form-note   { font-size:13px; color:var(--text-4); line-height:1.85; margin-bottom:34px; }
  .form-social { text-align:center; font-size:12px; color:var(--text-5); margin-top:20px; }

  /* ══ CONFIRMATION ══ */
  .confirm-titre { font-family:var(--serif); font-size:clamp(30px,8.5vw,44px); font-weight:300; color:var(--text); margin-bottom:32px; }
  .confirm-texte { font-size:16px; line-height:1.95; color:var(--text-2); margin-bottom:44px; }
  .confirm-box { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:26px 26px 22px; margin-bottom:52px; }
  .confirm-box-label { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-4); margin-bottom:16px; }
  .confirm-box span  { display:block; font-size:14px; color:var(--text-3); margin-bottom:10px; line-height:1.7; }
  .confirm-message { padding:44px 0; border-top:1px solid var(--border); margin-bottom:52px; }
  .confirm-message p { font-family:var(--serif); font-style:italic; font-size:19px; font-weight:300; color:var(--text-3); line-height:1.85; margin-bottom:18px; }
  .confirm-sig { font-size:14px !important; color:var(--gold-dim) !important; margin-top:20px !important; letter-spacing:.1em; }
  .confirm-citation { margin-top:60px; padding-top:36px; border-top:1px solid var(--border); text-align:center; }
  .confirm-citation p { font-family:var(--serif); font-style:italic; font-size:16px; color:var(--text-4); line-height:1.78; }

  /* ══ MOBILE ══ */
  @media (max-width:430px) {
    .page           { padding:52px 22px max(84px,env(safe-area-inset-bottom,0px) + 64px); }
    .logo           { margin-bottom:52px; }
    .q-meta         { margin-bottom:40px; }
    .q-body         { margin-bottom:36px; }
    .phrase-wrap    { padding:44px 22px 52px; }
    .phrase-text    { font-size:19px; }
    .btn-answer     { font-size:15px; padding:18px 18px; }
    .accueil-titre  { margin-bottom:44px; }
    .trust-num      { font-size:20px; }
    .email-cover-wrap { flex-direction:column; align-items:flex-start; }
  }

  @supports (-webkit-touch-callout:none) {
    body  { min-height:-webkit-fill-available; }
    .page { min-height:-webkit-fill-available; }
  }

  * { -webkit-tap-highlight-color:transparent; }

</style>

// ─── SCORE ───────────────────────────────────────────────────────────────────

function calculateProfil(answers) {
  let b = 0, s = 0, d = 0;
  for (let i = 0; i < 9; i++) {
    const r = QUESTIONS[i].reponses[answers[i]];
    if (r.profil === "blessure")   b += r.points;
    if (r.profil === "stagnation") s += r.points;
    if (r.profil === "discipline") d += r.points;
  }
  const q10 = QUESTIONS[9].reponses[answers[9]];
  if (q10.profil === "blessure")        b += 2;
  else if (q10.profil === "stagnation") s += 2;
  else if (q10.profil === "discipline") d += 2;
  else {
    const mx = Math.max(b, s, d);
    if (b === mx) b++; else if (s === mx) s++; else d++;
  }
  const mx = Math.max(b, s, d);
  const tied = ["blessure","stagnation","discipline"].filter(
    (k, i) => [b, s, d][i] === mx
  );
  if (tied.length === 1) return tied[0];
  const q10p = q10.profil;
  if (q10p !== "dominant" && tied.includes(q10p)) return q10p;
  for (let i = 8; i >= 5; i--) {
    const p = QUESTIONS[i].reponses[answers[i]].profil;
    if (tied.includes(p)) return p;
  }
  return tied[0];
}

// ─── PAGE QUESTION ───────────────────────────────────────────────────────────

function PageQuestion({ question, qIndex, total, onAnswer }) {
  const [ps, setPs]               = useState("enter");
  const [ph, setPh]               = useState("idle");
  const [phraseText, setPhraseText] = useState("");
  const timers = useRef([]);
  const clr = () => { timers.current.forEach(clearTimeout); timers.current = []; };

  useEffect(() => {
    setPs("enter");
    const t = setTimeout(() => setPs("show"), 60);
    timers.current.push(t);
    return clr;
  }, [qIndex]);

  function pick(i) {
    if (ph !== "idle") return;
    clr();
    setPhraseText(question.reponses[i].phrase);
    setPh("in");
    timers.current.push(setTimeout(() => setPh("hold"),  T.PHRASE_IN));
    timers.current.push(setTimeout(() => setPh("out"),   O.FADE_OUT));
    timers.current.push(setTimeout(() => { setPh("gone"); setPs("leave"); }, O.PAGE_LEAVE));
    timers.current.push(setTimeout(() => {
      setPh("idle"); setPhraseText(""); setPs("enter");
      onAnswer(i);
    }, O.NEXT));
  }

  const locked = ph !== "idle";

  return (
    <div className={`page page-question ps-${ps}`}>
      <div className="q-progress-wrap">
        <div className="q-progress">
          <div className="q-progress-fill" style={{ width: `${(qIndex / total) * 100}%` }} />
        </div>
        <span className="q-count-inline">{qIndex + 1} / {total}</span>
      </div>
      <div className="q-meta">
        <span className="q-breathe">Pran out tan.</span>
        <span className="q-hint">Néna pa de bonne ou mové répons.</span>
      </div>
      <div className="q-body">
        <h2 className="q-text">{question.text}</h2>
      </div>
      <div className="q-answers">
        {question.reponses.map((r, i) => (
          <button key={i} className={`btn-answer${locked ? " locked" : ""}`} onClick={() => pick(i)}>
            {r.label}
          </button>
        ))}
      </div>
      {ph !== "idle" && ph !== "gone" && (
        <div className={`phrase-wrap ph-${ph}`}>
          <div className="phrase-ornament" />
          <p className="phrase-text">{phraseText}</p>
          <p className="phrase-sub">Pran in moman pou toi.</p>
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [vue, setVue]         = useState("accueil");
  const [qIndex, setQIndex]   = useState(0);
  const [answers, setAnswers] = useState([]);
  const [profil, setProfil]   = useState(null);
  const [prenom, setPrenom]   = useState("");

  useEffect(() => log("loaded"), []);

  function answer(i) {
    const next = [...answers, i];
    setAnswers(next);
    if (qIndex < QUESTIONS.length - 1) {
      setQIndex(qIndex + 1);
    } else {
      setVue("analyse");
      setTimeout(() => { setProfil(calculateProfil(next)); setVue("email"); }, 3400);
    }
  }

  function submitEmail({ prenom: p, email }) {
    setPrenom(p);
    const pd = PROFILS[profil];

    // Send to MailerLite via Netlify function
    fetch("/.netlify/functions/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prenom: p,
        email: email,
        profil: pd.groupe,
        pdfFile: pd.pdfFile,
        date: new Date().toISOString(),
      }),
    })
    .then(function(res) {
      if (!res.ok) {
        console.error("[RNZ] Subscribe error:", res.status);
      }
    })
    .catch(function(e) {
      console.error("[RNZ] Network error:", e);
    });

    // Affiche le résultat après avoir capturé l'email
    setVue("resultat");
  }

  function reset() {
    setVue("accueil"); setQIndex(0); setAnswers([]); setProfil(null); setPrenom("");
    log("reset");
  }

  return (
    <>
      {vue === "accueil"      && <PageAccueil onStart={() => { log("diagnostic_started"); setVue("questions"); }} />}
      {vue === "questions"    && <PageQuestion question={QUESTIONS[qIndex]} qIndex={qIndex} total={QUESTIONS.length} onAnswer={answer} />}
      {vue === "analyse"      && <PageAnalyse />}
      {vue === "email"    && profil && <PageEmail profil={profil} onSubmit={submitEmail} />}
      {vue === "resultat" && profil && <PageResultat profil={profil} prenom={prenom} onRecevoir={() => setVue("confirmation")} />}
      {vue === "confirmation" && <PageConfirmation onRefaire={reset} onAccueil={reset} />}
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(App)
);
