<!DOCTYPE html>
<html lang="cr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Rouv Nout Zyé — Tourne la roue !</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:     #0A0A0A;
  --bg2:    #111111;
  --card:   #161616;
  --b:      #242424;
  --bh:     #333333;
  --text:   #F0F0EE;
  --t2:     #C0C0BC;
  --t3:     #808080;
  --t4:     #505050;
  --t5:     #282828;
  --gold:   #C9A96E;
  --gold2:  #E8C98A;
  --golddim:#7A6240;
  --serif:  'Cormorant Garamond', Georgia, serif;
  --sans:   'DM Sans', system-ui, sans-serif;
  --ease:   cubic-bezier(.22,.68,0,1.15);
  --r:      10px;
}

html { scroll-behavior:smooth; }

body {
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-weight:300;
  font-size:16px;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
  background-image:
    radial-gradient(ellipse 140% 50% at 50% 0%, #1A1408 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 50% 100%, #100C06 0%, transparent 50%);
}

@keyframes up      { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes bounce  { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-10px) scale(1.05)} }
@keyframes glow    { 0%,100%{box-shadow:0 0 30px rgba(201,169,110,.18)} 50%{box-shadow:0 0 60px rgba(201,169,110,.4)} }
@keyframes winPop  { 0%{opacity:0;transform:scale(.75) translateY(20px)} 70%{transform:scale(1.04) translateY(-3px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
@keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes confetti{ 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(300px) rotate(540deg);opacity:0} }
@keyframes arrowPulse { 0%,100%{transform:translateY(-50%) translateX(0)} 50%{transform:translateY(-50%) translateX(-4px)} }
@keyframes glowRing { 0%,100%{opacity:.4} 50%{opacity:.8} }

/* NAV */
nav {
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,10,.96);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b);
  height:58px; padding:0 28px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-logo {
  font-family:var(--serif); font-size:11px; font-weight:400;
  letter-spacing:.58em; color:var(--golddim);
  text-transform:uppercase; text-decoration:none;
}
.nav-badge {
  font-size:10px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--t4); padding:5px 12px;
  border:1px solid var(--b); border-radius:100px;
}

/* PAGE */
.page {
  max-width:540px; margin:0 auto;
  padding:56px 24px max(80px,env(safe-area-inset-bottom,0px)+64px);
  display:flex; flex-direction:column; align-items:center;
  animation:up .7s both;
}

.logo {
  font-family:var(--serif); font-size:11px; font-weight:400;
  letter-spacing:.58em; color:var(--golddim);
  text-transform:uppercase; margin-bottom:44px; width:100%; text-align:center;
}

/* HERO */
.hero-label {
  font-size:10px; letter-spacing:.3em; text-transform:uppercase;
  color:var(--t4); margin-bottom:14px; text-align:center;
  display:flex; align-items:center; gap:12px;
}
.hero-label::before, .hero-label::after { content:''; flex:1; height:1px; background:var(--b); }

.hero-titre {
  font-family:var(--serif);
  font-size:clamp(34px,9.5vw,52px);
  font-weight:300; line-height:1.08;
  color:var(--text); text-align:center; margin-bottom:14px;
}
.hero-titre em { font-style:italic; color:var(--gold); }

.hero-sub {
  font-size:15px; color:var(--t3); line-height:1.78;
  text-align:center; margin-bottom:40px;
  max-width:380px;
}

/* FORM */
.form-wrap { width:100%; margin-bottom:36px; }

.field {
  width:100%; background:var(--card); border:1px solid var(--b); border-radius:var(--r);
  padding:17px 20px; font-family:var(--sans); font-size:16px; font-weight:300;
  color:var(--text); outline:none; transition:border-color .2s, box-shadow .2s;
  min-height:54px; margin-bottom:10px; display:block;
}
.field:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,110,.08); }
.field::placeholder { color:var(--t4); }
.form-err { font-size:13px; color:#E05555; margin-bottom:10px; line-height:1.6; text-align:center; }

/* ROUE ZONE */
.roue-zone { width:100%; display:flex; flex-direction:column; align-items:center; margin-bottom:32px; }

.roue-glow-ring {
  width:min(360px,90vw); height:min(360px,90vw);
  border-radius:50%;
  background:radial-gradient(ellipse, rgba(201,169,110,.08) 0%, transparent 70%);
  display:flex; align-items:center; justify-content:center;
  position:relative;
  animation:glowRing 4s ease infinite;
}

.roue-wrap {
  position:relative;
  width:min(320px,82vw); height:min(320px,82vw);
  filter:drop-shadow(0 8px 40px rgba(0,0,0,.7)) drop-shadow(0 0 20px rgba(201,169,110,.12));
}

canvas#roue { width:100%; height:100%; display:block; }

.arrow-wrap {
  position:absolute; top:50%; right:-20px;
  transform:translateY(-50%);
  z-index:10;
  animation:arrowPulse 1.8s ease infinite;
}
.arrow-svg { width:28px; height:28px; }

.roue-center-btn {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:52px; height:52px; border-radius:50%;
  background:var(--bg); border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  z-index:10; cursor:pointer;
  box-shadow:0 0 20px rgba(201,169,110,.25), inset 0 1px 0 rgba(255,255,255,.06);
  transition:all .2s;
  font-size:18px;
  animation:shimmer 2.5s ease infinite;
}
.roue-center-btn:hover { box-shadow:0 0 32px rgba(201,169,110,.45); transform:translate(-50%,-50%) scale(1.06); }

/* BOUTON SPIN */
.btn-spin {
  width:100%; max-width:400px;
  background:linear-gradient(135deg, #D4B47A 0%, #A87E44 100%);
  color:#0A0A0A; border:none; border-radius:var(--r);
  padding:20px 28px; min-height:62px;
  font-family:var(--sans); font-size:13px; font-weight:500;
  letter-spacing:.22em; text-transform:uppercase;
  cursor:pointer; transition:all .25s;
  box-shadow:0 4px 28px rgba(201,169,110,.28);
  animation:glow 3s ease infinite;
  display:flex; align-items:center; justify-content:center; gap:12px;
  margin-bottom:12px;
}
.btn-spin:hover   { opacity:.9; transform:translateY(-2px); box-shadow:0 8px 44px rgba(201,169,110,.45); }
.btn-spin:active  { transform:scale(.988); }
.btn-spin:disabled{ background:var(--b); color:var(--t4); cursor:not-allowed; box-shadow:none; animation:none; }

.spin-note { font-size:12px; color:var(--t4); text-align:center; line-height:1.7; }

/* OVERLAY GAGNANT */
.win-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.9); backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  animation:fadeIn .35s both;
}

.win-card {
  background:var(--card);
  border:1px solid var(--b);
  border-radius:16px; padding:44px 36px;
  max-width:420px; width:100%; text-align:center;
  position:relative; overflow:hidden;
  animation:winPop .55s var(--ease) both;
  box-shadow:0 24px 80px rgba(0,0,0,.8);
}
.win-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.win-icon {
  font-size:56px; display:block; margin-bottom:20px;
  animation:bounce 2.5s ease infinite;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));
}
.win-eyebrow {
  font-size:10px; letter-spacing:.3em; text-transform:uppercase;
  color:var(--golddim); margin-bottom:12px;
}
.win-titre {
  font-family:var(--serif);
  font-size:clamp(26px,6.5vw,34px);
  font-weight:300; line-height:1.15;
  margin-bottom:12px;
}
.win-desc { font-size:15px; color:var(--t2); line-height:1.82; margin-bottom:32px; }

.win-divider { width:40px; height:1px; background:var(--b); margin:0 auto 24px; }

.btn-claim {
  width:100%; background:linear-gradient(135deg,#D4B47A 0%,#A87E44 100%);
  color:#0A0A0A; border:none; border-radius:var(--r);
  padding:18px 24px; min-height:58px;
  font-family:var(--sans); font-size:12px; font-weight:500;
  letter-spacing:.2em; text-transform:uppercase;
  cursor:pointer; transition:all .22s;
  box-shadow:0 4px 20px rgba(201,169,110,.3);
  display:flex; align-items:center; justify-content:center; gap:10px;
  margin-bottom:10px;
}
.btn-claim:hover   { opacity:.88; transform:translateY(-1px); }
.btn-claim:disabled{ background:var(--b); color:var(--t4); cursor:not-allowed; box-shadow:none; }

.btn-later {
  width:100%; background:transparent; color:var(--t3);
  border:1px solid var(--b); border-radius:var(--r);
  padding:14px 24px; min-height:48px;
  font-family:var(--sans); font-size:11px; font-weight:300;
  letter-spacing:.16em; text-transform:uppercase;
  cursor:pointer; transition:all .22s;
}
.btn-later:hover { border-color:var(--bh); color:var(--t2); }

.win-err { font-size:13px; color:#E05555; margin-bottom:12px; line-height:1.6; }

/* DÉJÀ JOUÉ */
.already-card {
  background:var(--card); border:1px solid var(--b);
  border-radius:var(--r); padding:36px 28px;
  text-align:center; width:100%; margin-top:28px;
}
.already-icon  { font-size:40px; margin-bottom:16px; display:block; }
.already-titre { font-family:var(--serif); font-size:24px; font-weight:300; color:var(--text); margin-bottom:10px; }
.already-desc  { font-size:14px; color:var(--t3); line-height:1.78; }

/* CONFIRMATION */
.confirm-wrap { width:100%; text-align:center; }
.confirm-badge {
  display:inline-flex; align-items:center; gap:8px;
  font-size:10px; letter-spacing:.26em; text-transform:uppercase;
  color:var(--gold); background:rgba(201,169,110,.08);
  border:1px solid rgba(201,169,110,.2);
  padding:8px 18px; border-radius:100px; margin-bottom:28px;
}
.confirm-titre {
  font-family:var(--serif);
  font-size:clamp(28px,7.5vw,42px);
  font-weight:300; line-height:1.1;
  color:var(--text); margin-bottom:14px;
}
.confirm-titre em { font-style:italic; color:var(--gold); }
.confirm-texte { font-size:15px; color:var(--t2); line-height:1.88; margin-bottom:32px; }

.confirm-lot-card {
  background:var(--card); border:1px solid var(--b);
  border-radius:var(--r); padding:24px 26px;
  display:flex; align-items:center; gap:18px;
  margin-bottom:28px; text-align:left;
  position:relative; overflow:hidden;
}
.confirm-lot-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.4;
}
.confirm-lot-icon  { font-size:32px; flex-shrink:0; }
.confirm-lot-titre { font-family:var(--serif); font-style:italic; font-size:20px; color:var(--text); margin-bottom:5px; line-height:1.2; }
.confirm-lot-desc  { font-size:13px; color:var(--t3); line-height:1.6; }

.confirm-spam { font-size:12px; color:var(--t4); line-height:1.8; margin-bottom:28px; }

.btn-share {
  width:100%; background:transparent; color:var(--t2);
  border:1px solid var(--b); border-radius:var(--r);
  padding:16px 24px; min-height:52px;
  font-family:var(--sans); font-size:12px; font-weight:300;
  letter-spacing:.16em; text-transform:uppercase;
  cursor:pointer; transition:all .22s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.btn-share:hover { border-color:var(--bh); color:var(--text); }

/* CONFETTI */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:600; overflow:hidden; }
.confetti-piece {
  position:absolute; border-radius:2px;
  animation:confetti linear both;
}

.page-footer { margin-top:44px; text-align:center; font-size:11px; color:var(--t5); letter-spacing:.06em; }

@media(max-width:540px){
  .page{padding:44px 18px max(72px,env(safe-area-inset-bottom,0px)+52px);}
  nav{padding:0 18px;}
  .win-card{padding:32px 20px;}
  .btn-spin{font-size:12px;}
}
*{-webkit-tap-highlight-color:transparent;}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">RNZ</a>
  <span class="nav-badge">Jeu Konso</span>
</nav>

<div id="app"></div>
<div id="confettiWrap" class="confetti-wrap"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const SHEETS_URL = "REMPLACE_PAR_TON_GOOGLE_SCRIPT_URL";
const LS_KEY     = "rnz_roue_played";

const LOTS = [
  {
    id:"pdf",
    icon:"📖",
    label:"Kado 1",
    titre:"PDF RNZ",
    couleur:"#C9A96E",
    desc:"Ou gayn in PDF RNZ profon — télésharzab imédiateman.",
    confirm_desc:"Ton PDF RNZ est en route — vérifie ta boîte email dans quelques secondes.",
    mailerlite_profil:"pdf-roue"
  },
  {
    id:"telegram",
    icon:"💬",
    label:"Kado 2",
    titre:"Akès Telegram Privé",
    couleur:"#9B8FD4",
    desc:"Akès gratui a mon kanal Telegram — kontan éklizif RNZ pou tou la sèmèn.",
    confirm_desc:"Ton lien d'accès Telegram privé RNZ arrive dans ton email.",
    mailerlite_profil:"telegram-roue"
  },
  {
    id:"citations",
    icon:"✨",
    label:"Kado 3",
    titre:"30 Sitation RNZ",
    couleur:"#6BAE8A",
    desc:"30 sitation an kréol réunionné — 1 par zour pandan 1 mois konplé.",
    confirm_desc:"Ta première citation arrive dès demain matin. Pendant 30 jours.",
    mailerlite_profil:"citations-roue"
  },
  {
    id:"livret",
    icon:"📕",
    label:"Kado 4",
    titre:"Livret RNZ Éklizif",
    couleur:"#C97878",
    desc:"In livret éklizif RNZ — profon, kalm, écri an kréol réunionné.",
    confirm_desc:"Ton livret RNZ exclusif est en route — vérifie ta boîte email.",
    mailerlite_profil:"livret-roue"
  }
];

// Probabilités égales — tout le monde gagne
const PROBS = [0.25, 0.25, 0.25, 0.25];

// ── STATE ─────────────────────────────────────────────────────────
let vue = "accueil";
let spinning = false;
let wonLot = null;
let showWin = false;
let prenom = "", email = "", err = "", busy = false;
let currentAngle = 0;
let alreadyPlayed = false;

// Vérifie localStorage
function checkAlreadyPlayed() {
  try {
    const data = localStorage.getItem(LS_KEY);
    if(data) { alreadyPlayed = true; wonLot = JSON.parse(data).lot || null; }
  } catch(e){}
}
checkAlreadyPlayed();

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  document.getElementById("app").innerHTML =
    vue === "accueil"      ? renderAccueil()      :
    vue === "confirmation" ? renderConfirmation() : "";
  afterRender();
}

// ── ACCUEIL ───────────────────────────────────────────────────────
function renderAccueil() {
  if(alreadyPlayed) {
    return `
      <div class="page">
        <div class="logo">RNZ</div>
        <div class="already-card">
          <span class="already-icon">🎁</span>
          <div class="already-titre">Ou la déza tourné !</div>
          <p class="already-desc">
            Chak moun i na le droi a in sèl tour.<br>
            ${wonLot ? `Out lot : <strong style="color:var(--gold)">${wonLot.titre}</strong> — vérifie out email.` : "Vérifie out email pou trouv out kado."}
          </p>
        </div>
        <div class="page-footer">Rouv Nout Zyé · La Réunion</div>
      </div>`;
  }

  return `
    <div class="page">
      <div class="logo">RNZ</div>

      <div class="hero-label">Jeu Konso RNZ</div>
      <h1 class="hero-titre">Tourne la roue<br>é gayn <em>out kado</em> !</h1>
      <p class="hero-sub">Tou le moun i gayn quelque chose. Rant out email pou découvrir out lot.</p>

      <!-- FORM -->
      <div class="form-wrap">
        ${err ? `<div class="form-err">${err}</div>` : ""}
        <input class="field" type="text" placeholder="Out prénom" id="fp"
          value="${esc(prenom)}" oninput="prenom=this.value;clearErr()" />
        <input class="field" type="email" placeholder="Out email" id="fe"
          value="${esc(email)}" oninput="email=this.value;clearErr()"
          onkeydown="if(event.key==='Enter')startSpin()" />
      </div>

      <!-- ROUE -->
      <div class="roue-zone">
        <div class="roue-glow-ring">
          <div class="roue-wrap" id="roueWrap">
            <canvas id="roue" width="480" height="480"></canvas>
            <div class="arrow-wrap">
              <svg class="arrow-svg" viewBox="0 0 28 28" fill="none">
                <path d="M2 14L22 4L18 14L22 24L2 14Z" fill="#C9A96E" stroke="#C9A96E" stroke-width="1" stroke-linejoin="round"/>
              </svg>
            </div>
            <button class="roue-center-btn" onclick="startSpin()" title="Tourne !">🎰</button>
          </div>
        </div>
      </div>

      <!-- BOUTON -->
      <button class="btn-spin" id="btnSpin" onclick="startSpin()">
        Tourne la roue — Gratui
      </button>
      <p class="spin-note">1 sèl tour par moun · Tou le moun i gayn</p>

      <div class="page-footer">Rouv Nout Zyé · La Réunion</div>
    </div>

    ${showWin && wonLot ? renderWinOverlay() : ""}
  `;
}

// ── WIN OVERLAY ───────────────────────────────────────────────────
function renderWinOverlay() {
  return `
    <div class="win-overlay">
      <div class="win-card">
        <span class="win-icon">${wonLot.icon}</span>
        <div class="win-eyebrow">Félisitasion — ou gayn !</div>
        <h2 class="win-titre" style="color:${wonLot.couleur}">${wonLot.titre}</h2>
        <p class="win-desc">${wonLot.desc}</p>
        <div class="win-divider"></div>
        ${err ? `<div class="win-err">${err}</div>` : ""}
        <button class="btn-claim" onclick="claimLot()" ${busy?'disabled':''}>
          ${busy ? '⏳ Anvoiyé...' : 'Resevoir mon kado →'}
        </button>
        <button class="btn-later" onclick="closeWin()">Pa mintenan</button>
      </div>
    </div>`;
}

// ── CONFIRMATION ──────────────────────────────────────────────────
function renderConfirmation() {
  return `
    <div class="page">
      <div class="confirm-wrap">
        <div class="confirm-badge">🎉 Kado réservé !</div>
        <h2 class="confirm-titre">
          ${prenom ? esc(prenom)+" —" : ""}<br>
          <em>Out kado lé an routo !</em>
        </h2>
        <p class="confirm-texte">
          ${wonLot.confirm_desc}
        </p>

        <div class="confirm-lot-card">
          <div class="confirm-lot-icon">${wonLot.icon}</div>
          <div>
            <div class="confirm-lot-titre" style="color:${wonLot.couleur}">${wonLot.titre}</div>
            <div class="confirm-lot-desc">${wonLot.desc}</div>
          </div>
        </div>

        <p class="confirm-spam">
          📬 Si ou trouv pa le mail — vérifie Spam ou Promotions.
        </p>

        <button class="btn-share" onclick="share()">
          🔗 Partaz ek bann amis — zot pé tourné osi
        </button>
      </div>
      <div class="page-footer">Rouv Nout Zyé · La Réunion</div>
    </div>`;
}

// ── DESSIN ROUE PREMIUM ───────────────────────────────────────────
function drawWheel(angle) {
  const canvas = document.getElementById("roue");
  if(!canvas) return;
  const ctx  = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const rOuter = W/2 - 6;
  const rInner = rOuter * 0.22;
  const n = LOTS.length;
  const arc = (2*Math.PI)/n;

  ctx.clearRect(0,0,W,H);

  LOTS.forEach((lot,i) => {
    const start = angle + i*arc - Math.PI/2;
    const end   = start + arc;
    const mid   = start + arc/2;

    // Segment fond
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,rOuter,start,end);
    ctx.closePath();

    // Dégradé radial par segment
    const gx = cx + Math.cos(mid)*rOuter*0.5;
    const gy = cy + Math.sin(mid)*rOuter*0.5;
    const grad = ctx.createRadialGradient(gx,gy,0,gx,gy,rOuter*0.8);
    grad.addColorStop(0, lot.couleur + "28");
    grad.addColorStop(1, lot.couleur + "0A");
    ctx.fillStyle = grad;
    ctx.fill();

    // Bordure segment
    ctx.strokeStyle = lot.couleur + "40";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Séparateur ligne depuis centre
    ctx.beginPath();
    ctx.moveTo(
      cx + Math.cos(start) * rInner,
      cy + Math.sin(start) * rInner
    );
    ctx.lineTo(
      cx + Math.cos(start) * rOuter,
      cy + Math.sin(start) * rOuter
    );
    ctx.strokeStyle = "rgba(201,169,110,.18)";
    ctx.lineWidth = 1;
    ctx.stroke();

    // Icône mystère 🎁 — PAS le lot réel
    const iconR = rOuter * 0.52;
    ctx.save();
    ctx.translate(cx + Math.cos(mid)*iconR, cy + Math.sin(mid)*iconR);
    ctx.font = `${W*0.09}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.globalAlpha = 0.85;
    ctx.fillText("🎁", 0, 0);
    ctx.restore();

    // Numéro de kado
    const labelR = rOuter * 0.82;
    ctx.save();
    ctx.translate(cx + Math.cos(mid)*labelR, cy + Math.sin(mid)*labelR);
    ctx.rotate(mid + Math.PI/2);
    ctx.font = `300 ${W*0.04}px 'DM Sans', sans-serif`;
    ctx.fillStyle = lot.couleur + "AA";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(lot.label, 0, 0);
    ctx.restore();
  });

  // Anneau extérieur doré
  ctx.beginPath();
  ctx.arc(cx,cy,rOuter,0,2*Math.PI);
  ctx.strokeStyle = "rgba(201,169,110,.3)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // Anneau intérieur
  ctx.beginPath();
  ctx.arc(cx,cy,rOuter*0.98,0,2*Math.PI);
  ctx.strokeStyle = "rgba(201,169,110,.1)";
  ctx.lineWidth = 1;
  ctx.stroke();

  // Centre opaque
  ctx.beginPath();
  ctx.arc(cx,cy,rInner+2,0,2*Math.PI);
  ctx.fillStyle = "#0A0A0A";
  ctx.fill();
  ctx.strokeStyle = "rgba(201,169,110,.5)";
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ── SPIN ──────────────────────────────────────────────────────────
function startSpin() {
  if(spinning) return;
  if(alreadyPlayed) return;
  err = "";

  if(!prenom.trim()) { err="Rant out prénom."; render(); return; }
  if(!email.includes("@")||!email.includes(".")) { err="Rant in email valid."; render(); return; }

  // Vérif email côté serveur (Google Sheets)
  if(SHEETS_URL !== "REMPLACE_PAR_TON_GOOGLE_SCRIPT_URL") {
    checkEmailUnique(email.trim()).then(unique => {
      if(!unique) {
        err="Sé email la la déza tourné — in sèl tour par moun.";
        alreadyPlayed = true;
        render();
      } else {
        doSpin();
      }
    }).catch(() => doSpin()); // Si erreur réseau — on laisse jouer
  } else {
    doSpin();
  }
}

async function checkEmailUnique(em) {
  try {
    const res = await fetch(SHEETS_URL + "?check=" + encodeURIComponent(em));
    const data = await res.json();
    return data.unique !== false;
  } catch(e) { return true; }
}

function doSpin() {
  spinning = true;
  const btn = document.getElementById("btnSpin");
  if(btn) btn.disabled = true;

  // Choisir lot
  const rand = Math.random();
  let cumul = 0, lotIndex = 0;
  for(let i=0;i<PROBS.length;i++) { cumul+=PROBS[i]; if(rand<cumul){lotIndex=i;break;} }
  wonLot = LOTS[lotIndex];

  // Angle cible
  const n = LOTS.length;
  const arc = 360/n;
  const lotCenter = lotIndex * arc + arc/2;
  const totalDeg  = 360*7 + (360 - lotCenter + 5); // +5 décalage visuel
  const duration  = 5200;
  const startTime = performance.now();
  const startDeg  = currentAngle * (180/Math.PI);

  function animSpin(now) {
    const elapsed  = now - startTime;
    const progress = Math.min(elapsed/duration, 1);
    // Easing quartique
    const ease = progress < 1
      ? 1 - Math.pow(1-progress, 4)
      : 1;
    const deg = startDeg + totalDeg * ease;
    currentAngle = deg * (Math.PI/180);
    drawWheel(currentAngle);

    if(progress < 1) {
      requestAnimationFrame(animSpin);
    } else {
      spinning = false;
      showWin  = true;
      spawnConfetti();
      render();
    }
  }
  requestAnimationFrame(animSpin);
}

// ── CONFETTI ──────────────────────────────────────────────────────
function spawnConfetti() {
  const wrap = document.getElementById("confettiWrap");
  if(!wrap) return;
  wrap.innerHTML = "";
  const colors = ["#C9A96E","#9B8FD4","#6BAE8A","#C97878","#F0F0EE","#E8C98A"];
  for(let i=0;i<60;i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    const size = 6 + Math.random()*8;
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${-10+Math.random()*20}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*0.8}s;
      animation-duration:${2+Math.random()*1.5}s;
      border-radius:${Math.random()>0.5?'50%':'3px'};
      opacity:${0.7+Math.random()*0.3};
    `;
    wrap.appendChild(el);
  }
  setTimeout(()=>{ if(wrap) wrap.innerHTML=""; }, 4500);
}
